<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Contact — Impec Studio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
        name="description"
        content="Contacte Impec Studio pour parler de ton projet visuel, identité, communication, affiches ou contenus réseaux sociaux."
    >
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="contact">

    <div data-include="partials/header.html"></div>

    <main>
        <section class="contact-showcase">
            <div class="container">
                <div class="contact-shell glass-card">
                    <div class="contact-bg-word">CONTACT</div>

                    <div class="contact-showcase-grid">
                        <div class="contact-showcase-left">
                            <p class="contact-pill">-- Contact</p>

                            <h1>ON EN DISCUTE ?</h1>

                            <p class="contact-intro">
                                Un projet en tête, une idée à développer ou un besoin en communication visuelle ?
                                Parlons-en et construisons quelque chose de fort ensemble.
                            </p>

                            <div class="contact-cards">
                                <a href="mailto:lucasrabut1805@gmail.com" class="contact-link-card glass-card">
                                    <div class="contact-link-card-text">
                                        <span class="contact-link-label">Email</span>
                                        <strong>lucasrabut1805@gmail.com</strong>
                                    </div>
                                    <span class="contact-link-arrow">↗</span>
                                </a>

                                <a href="https://instagram.com/impec_studio" target="_blank" class="contact-link-card glass-card">
                                    <div class="contact-link-card-text">
                                        <span class="contact-link-label">Instagram</span>
                                        <strong>@impec_studio</strong>
                                    </div>
                                    <span class="contact-link-arrow">↗</span>
                                </a>

                                <div class="contact-link-card glass-card">
                                    <div class="contact-link-card-text">
                                        <span class="contact-link-label">Disponibilité</span>
                                        <strong>À distance et localement</strong>
                                    </div>
                                    <span class="contact-link-arrow">•</span>
                                </div>
                            </div>
                        </div>

                        <div class="contact-showcase-right">
                            <form class="contact-form-showcase" action="#" method="post">
                                <div class="form-group">
                                    <input type="text" id="name" name="name" placeholder="Nom" required>
                                </div>

                                <div class="form-group">
                                    <input type="email" id="email" name="email" placeholder="Email" required>
                                </div>

                                <div class="form-group">
                                    <input type="text" id="subject" name="subject" placeholder="Sujet">
                                </div>

                                <div class="form-group">
                                    <textarea id="message" name="message" rows="9" placeholder="Parle-moi de ton projet..."></textarea>
                                </div>

                                <button type="submit" class="btn btn-contact-submit">
                                    <span>Envoyer</span>
                                    <span class="btn-fill-line"></span>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div data-include="partials/footer.html"></div>

    <script src="assets/js/includes.js"></script>
</body>
</html>
